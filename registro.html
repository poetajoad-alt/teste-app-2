<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cadastre-se na Isabele Mariana Nails">
  <meta name="theme-color" content="#934761">
  <meta property="og:title" content="Cadastro - Isabele Mariana Nails">
  <meta property="og:description" content="Cadastre-se para agendar seus serviços">
  <meta property="og:type" content="website">
  <title>Cadastro - Isabele Mariana Nails</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="registro.css">
</head>

<body data-page="signup">
  <div class="app-container">
    <main class="signup-main">
      <section class="signup-header">
        <nav class="signup-nav">
          <!-- Voltar: history-aware fallback para index.html -->
          <a href="index.html" data-back="history" class="signup-nav-link" aria-label="Voltar">‹</a>
          <h1 class="signup-title">Registre-se</h1>
          <!-- Home: leva ao principal -->
          <a href="principal.html" class="signup-nav-link" aria-label="Home">⌂</a>
        </nav>
      </section>

      <section class="signup-content">
        <form class="signup-form" id="signupForm" novalidate>
          <!-- Nome -->
          <div class="form-group">
            <label for="nameInput" class="form-label">Nome</label>
            <input type="text" id="nameInput" class="signup-input signup-input--primary" placeholder="Seu nome completo" required aria-label="Nome completo para cadastro" data-action="input-name">
          </div>

          <!-- E-mail -->
          <div class="form-group">
            <label for="emailInput" class="form-label">E-mail</label>
            <input type="email" id="emailInput" class="signup-input" placeholder="seu@email.com" required aria-label="E-mail para cadastro" data-action="input-email">
          </div>

          <!-- Celular -->
          <div class="form-group">
            <label for="phoneInput" class="form-label">Celular</label>
            <input type="tel" id="phoneInput" class="signup-input" placeholder="(11) 99999-9999" required aria-label="Celular para contato" data-action="input-phone">
          </div>

          <!-- Checkbox de Termos -->
          <div class="form-group form-group--checkbox">
            <div class="checkbox-wrapper">
              <input type="checkbox" id="termsCheckbox" class="signup-checkbox" required aria-label="Concordo com os Termos e Condições" data-action="terms-checkbox">
              <label for="termsCheckbox" class="checkbox-label">
                Concorde com os Termos e Condições
              </label>
            </div>
          </div>

          <!-- Botão de Cadastro -->
          <button type="submit" class="signup-button signup-button--primary" data-action="submit-signup">
            Registre-se
          </button>
        </form>

        <!-- Divisor com Texto -->
        <div class="form-divider">
          <span class="form-divider-text">ou</span>
        </div>

        <!-- Botão Google -->
        <button type="button" class="signup-button signup-button--google" id="googleSignupBtn" data-action="google-signup">
          <svg class="google-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
          </svg>
          <span class="google-text">Registre-se com o Google</span>
        </button>

        <!-- Link de Login -->
        <p class="signup-footer">
          Já tem uma conta?
          <a href="login.html" class="signup-link">Entre aqui</a>
        </p>
      </section>
    </main>
  </div>
  <script src="js/registro.js" defer></script>
  <script src="js/app.js" defer></script>
</body>

</html>
